<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书架页 — Library</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --surface-hover: #F5F2EE;
    --text-primary: #1A1A1A;
    --text-secondary: #8A8680;
    --text-tertiary: #B5AFA8;
    --accent: #C8553D;
    --accent-soft: #F2E0D9;
    --border: #E8E4DF;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── App Shell ── */
  .app {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-brand {
    padding: 0 20px 20px;
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .sidebar-section {
    padding: 0 12px;
    margin-bottom: 8px;
  }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    padding: 8px 8px 6px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: default;
    transition: all 0.15s;
  }

  .sidebar-item:hover { background: var(--surface-hover); color: var(--text-primary); }
  .sidebar-item.active { background: var(--accent-soft); color: var(--accent); }

  .sidebar-item .icon {
    width: 18px;
    height: 18px;
    opacity: 0.6;
  }

  .sidebar-item.active .icon { opacity: 1; }

  .sidebar-spacer { flex: 1; }

  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    min-width: 200px;
    transition: border-color 0.2s;
  }

  .search-box:hover { border-color: var(--text-tertiary); }

  .btn-primary {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: var(--shadow-sm); }

  /* ── Continue Reading Section ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    margin-bottom: 16px;
  }

  .continue-reading {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }

  .continue-card {
    display: flex;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    max-width: 480px;
  }

  .continue-card:hover {
    border-color: var(--text-tertiary);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .continue-cover {
    width: 72px;
    height: 96px;
    border-radius: 6px;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .continue-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .continue-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  .continue-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .continue-author {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }

  .continue-progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .continue-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .continue-progress-text {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── Book Grid ── */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 24px;
  }

  .book-card {
    cursor: pointer;
    transition: all 0.2s;
  }

  .book-card:hover { transform: translateY(-4px); }
  .book-card:hover .book-cover { box-shadow: var(--shadow-lg); }

  .book-cover {
    aspect-ratio: 3 / 4;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    background: var(--surface-hover);
  }

  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .book-cover .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-tertiary);
    background: linear-gradient(145deg, #F0ECE7, #E8E3DC);
  }

  .book-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 2px;
  }

  .book-author {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
  }

  .book-progress {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── Placeholder covers ── */
  .cover-1 { background: linear-gradient(135deg, #8B7355, #A69076); }
  .cover-2 { background: linear-gradient(135deg, #5B7B6F, #7A9E8F); }
  .cover-3 { background: linear-gradient(135deg, #7B6B8A, #9A8AAA); }
  .cover-4 { background: linear-gradient(135deg, #8A6B5B, #AA8B7B); }
  .cover-5 { background: linear-gradient(135deg, #5B6B7B, #7B8B9B); }
  .cover-6 { background: linear-gradient(135deg, #7B7B5B, #9B9B7B); }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">蓬莱山下</div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">书库</div>
      <div class="sidebar-item active">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        全部书籍
      </div>
      <div class="sidebar-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        最近阅读
      </div>
      <div class="sidebar-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        书签
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">设置</div>
      <div class="sidebar-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        阅读设置
      </div>
    </div>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">12 本藏书</div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="header">
      <h1>书架</h1>
      <div class="header-actions">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          搜索书籍...
        </div>
        <button class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          导入书籍
        </button>
      </div>
    </div>

    <!-- Continue Reading -->
    <div class="section-title">继续阅读</div>
    <div class="continue-reading">
      <div class="continue-card">
        <div class="continue-cover cover-1"></div>
        <div class="continue-info">
          <div class="continue-title">三体</div>
          <div class="continue-author">刘慈欣</div>
          <div class="continue-progress-bar"><div class="continue-progress-fill" style="width: 68%"></div></div>
          <div class="continue-progress-text">第 18 章 · 68%</div>
        </div>
      </div>
      <div class="continue-card">
        <div class="continue-cover cover-3"></div>
        <div class="continue-info">
          <div class="continue-title">百年孤独</div>
          <div class="continue-author">加西亚·马尔克斯</div>
          <div class="continue-progress-bar"><div class="continue-progress-fill" style="width: 34%"></div></div>
          <div class="continue-progress-text">第 7 章 · 34%</div>
        </div>
      </div>
    </div>

    <!-- All Books -->
    <div class="section-title">全部书籍</div>
    <div class="book-grid">
      <div class="book-card">
        <div class="book-cover cover-1"></div>
        <div class="book-title">三体</div>
        <div class="book-author">刘慈欣</div>
        <div class="book-progress">68% · EPUB</div>
      </div>
      <div class="book-card">
        <div class="book-cover cover-2"></div>
        <div class="book-title">活着</div>
        <div class="book-author">余华</div>
        <div class="book-progress">100% · EPUB</div>
      </div>
      <div class="book-card">
        <div class="book-cover cover-3"></div>
        <div class="book-title">百年孤独</div>
        <div class="book-author">加西亚·马尔克斯</div>
        <div class="book-progress">34% · EPUB</div>
      </div>
      <div class="book-card">
        <div class="book-cover cover-4"></div>
        <div class="book-title">红楼梦</div>
        <div class="book-author">曹雪芹</div>
        <div class="book-progress">12% · EPUB</div>
      </div>
      <div class="book-card">
        <div class="book-cover cover-5"></div>
        <div class="book-title">挪威的森林</div>
        <div class="book-author">村上春树</div>
        <div class="book-progress">未开始 · TXT</div>
      </div>
      <div class="book-card">
        <div class="book-cover cover-6"></div>
        <div class="book-title">小王子</div>
        <div class="book-author">圣埃克苏佩里</div>
        <div class="book-progress">未开始 · EPUB</div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
